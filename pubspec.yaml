name: pureotp
description: "A secure and elegant TOTP/HOTP authentication app built with Flutter."
publish_to: 'none'
version: 0.2.0+20

environment:
  sdk: ^3.9.0

dependencies:
  # Core & Internationalization
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # State Management & Hooks
  flutter_hooks: 0.21.3+1
  flutter_riverpod: 3.3.1
  hooks_riverpod: 3.3.1
  riverpod_annotation: 4.0.2

  # Navigation
  go_router: 17.2.3

  # Database & Persistence
  drift: 2.31.0
  drift_flutter: 0.2.8
  shared_preferences: 2.5.5
  sqlite3_flutter_libs: 0.5.42

  # UI & Styling
  dynamic_color: 1.8.1
  flutter_svg: 2.2.4
  flutter_swipe_action_cell: 3.1.6

  # Security & Cryptography
  base32: 2.2.0
  crypto: 3.0.7
  encrypt: 5.0.3
  hashlib: 2.3.4

  # Utilities & System
  file_selector: 1.1.0
  mobile_scanner: 7.2.0
  path: 1.9.1
  path_provider: 2.1.5

dev_dependencies:
  # Testing & Linting
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: 2.15.0
  drift_dev: 2.31.0
  riverpod_generator: 4.0.3

  # Tools
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

  fonts:
    - family: VarelaRound
      fonts:
        - asset: assets/fonts/VarelaRound-Regular.ttf